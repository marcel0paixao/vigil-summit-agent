name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://flowpilot:flowpilot@localhost:5432/flowpilot
      RABBITMQ_URL: amqp://flowpilot:flowpilot@localhost:5672
      REDIS_URL: redis://localhost:6379
      QDRANT_URL: http://localhost:6333
      JWT_SECRET: ci-secret-with-at-least-twenty-four-characters
      CREDENTIAL_ENCRYPTION_KEY: ci-encryption-secret-with-at-least-twenty-four-characters
      INTERNAL_API_TOKEN: ci-internal-secret-with-at-least-twenty-four-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @flowpilot/api prisma:validate

      - name: Generate Prisma client
        run: pnpm --filter @flowpilot/api prisma:generate

      - name: Build shared packages
        run: pnpm --filter @flowpilot/contracts --filter @flowpilot/config --filter @flowpilot/logger build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and frontend tests
        run: pnpm -r --filter '!@flowpilot/api' test && pnpm --filter @flowpilot/api exec tsx --test "src/**/*.test.ts"

      - name: Build
        run: pnpm build

  api-integration:
    name: API integration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowpilot_test
          POSTGRES_USER: flowpilot
          POSTGRES_PASSWORD: flowpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowpilot -d flowpilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://flowpilot:flowpilot@localhost:5432/flowpilot_test
      TEST_DATABASE_URL: postgresql://flowpilot:flowpilot@localhost:5432/flowpilot_test
      RABBITMQ_URL: amqp://flowpilot:flowpilot@localhost:5672
      REDIS_URL: redis://localhost:6379
      QDRANT_URL: http://localhost:6333
      JWT_SECRET: ci-secret-with-at-least-twenty-four-characters
      CREDENTIAL_ENCRYPTION_KEY: ci-encryption-secret-with-at-least-twenty-four-characters
      INTERNAL_API_TOKEN: ci-internal-secret-with-at-least-twenty-four-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @flowpilot/api prisma:generate

      - name: Build shared packages
        run: pnpm --filter @flowpilot/contracts --filter @flowpilot/config --filter @flowpilot/logger build

      - name: Apply API migrations
        run: pnpm --filter @flowpilot/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run API integration tests
        run: pnpm --filter @flowpilot/api exec tsx --test "src/**/*.integration-spec.ts"

      - name: Run engagement worker integration tests
        run: pnpm --filter @flowpilot/execution-worker exec tsx --test "src/**/*.integration-spec.ts"

  python:
    name: Python AI orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/ai-orchestrator

    env:
      AI_PROVIDER: deterministic
      FLOWPILOT_API_URL: http://localhost:3000/api
      FLOWPILOT_INTERNAL_API_TOKEN: ci-secret-with-at-least-twenty-four-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai-orchestrator/pyproject.toml

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest
